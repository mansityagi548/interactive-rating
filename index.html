<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/somecs.css">
</head>

<body>
    <main class="container">
        <div class="star">
            <img src="icons/icon-star.svg" alt="">
        </div>
        <header class="heading">
            <h1>How did we do?</h1>
        </header>
        <p id="description">Please let us know how we did with your support request. All feedback is appreciated to help
            us improve our offering!</p>
        <section class="rating">
            <button class="circle">1</button>
            <button class="circle">2</button>
            <button class="circle">3</button>
            <button class="circle">4</button>
            <button class="circle">5</button>
        </section>
        <button id="btn">SUBMIT</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
